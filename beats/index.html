<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#050505">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#050505">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#050505">
    <meta name="description" content="Preview and purchase beats and instrumentals by cyroz.">
    <meta name="author" content="cyroz">
    <meta property="og:title" content="Beats by cyroz">
    <meta property="og:description" content="Preview and purchase beats and instrumentals by cyroz.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cyroz.net/beats/">
    <meta property="og:image" content="https://cyroz.net/assets/images/og-preview.jpg">
    <meta property="og:site_name" content="cyroz">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Beats by cyroz">
    <meta name="twitter:description" content="Preview and purchase beats and instrumentals by cyroz.">
    <meta name="twitter:image" content="https://cyroz.net/assets/images/og-preview.jpg">
    <link rel="canonical" href="https://cyroz.net/beats/">
    <title>Beats by cyroz | Instrumentals</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&display=block" rel="stylesheet">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/beats.css">
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "CollectionPage",
            "name": "Beats by cyroz",
            "description": "Preview and purchase beats and instrumentals by cyroz.",
            "url": "https://cyroz.net/beats/",
            "isPartOf": {
                "@type": "WebSite",
                "name": "cyroz",
                "url": "https://cyroz.net/"
            }
        }
    </script>
</head>

<body>
    <div class="bg-canvas">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
        <div class="glow-cursor" id="glowCursor"></div>
    </div>

    <main class="container">
        <header class="hero">
            <h1>Beats</h1>
            <p>Preview and purchase instrumentals</p>
        </header>

        <!-- Beat cards are dynamically injected here -->
        <div class="back-wrapper" style="margin-bottom: 32px;">
            <a href="/" class="back-button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="19" y1="12" x2="5" y2="12" />
                    <polyline points="12 19 5 12 12 5" />
                </svg>
                Back to Home
            </a>
        </div>

        <div class="beats-grid" id="beatsGrid">
            <div class="beats-loading" id="beatsLoading">
                <div class="loading-spinner"></div>
                <span>Loading beats...</span>
            </div>
        </div>

        <div class="back-wrapper">
            <a href="/" class="back-button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="19" y1="12" x2="5" y2="12" />
                    <polyline points="12 19 5 12 12 5" />
                </svg>
                Back to Home
            </a>
        </div>

        <footer class="site-footer">
            <p>&copy; 2026 cyroz. All rights reserved.</p>
        </footer>
    </main>

    <script src="/js/beats-logic.js" defer></script>
    <script src="/js/cursor.js" defer></script>
</body>

</html>
